      var key = el.getAttribute('data-i18n');
      if (t[key]) el.textContent = t[key];
    });

    document.title = (l === 'ar') ? 'الشروط القانونية — Aurel Academy' : 'Mentions légales — Aurel Academy';

      b.classList.toggle('is-active', b.getAttribute('data-lang-set') === l);
    });
    try { localStorage.setItem('aurel-lang-legal', l); } catch (e) {}
  }

      applyLang(l);
      var url = new URL(location.href);
      url.searchParams.set('lang', l);
      history.replaceState(null, '', url.toString());
