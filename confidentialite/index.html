        <p>Chez <strong>Aurel Academy</strong>, la confiance et le respect de la vie privée de nos apprenants sont essentiels. La présente politique explique quelles données personnelles nous collectons via le site <strong>aurel-academy.com</strong> (le « Site »), pourquoi nous les collectons, comment nous les utilisons, à qui nous les transmettons, et quels sont vos droits.</p>\

  function applyLang(l) {
    document.documentElement.lang = l;
    document.documentElement.dir = (l === 'ar') ? 'rtl' : 'ltr';
    var t = I18N[l];
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      if (t[key]) el.textContent = t[key];
    });
    document.getElementById('content').innerHTML = t.content;
    document.title = (l === 'ar') ? 'سياسة الخصوصية — Aurel Academy' : 'Politique de confidentialité — Aurel Academy';
    document.querySelectorAll('[data-lang-set]').forEach(function (b) {
      b.classList.toggle('is-active', b.getAttribute('data-lang-set') === l);
    });
    try { localStorage.setItem('aurel-lang-legal', l); } catch (e) {}
  }

  applyLang(window.__aurelLang || 'fr');

  document.querySelectorAll('[data-lang-set]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var l = btn.getAttribute('data-lang-set');
      applyLang(l);
      var url = new URL(location.href);
      url.searchParams.set('lang', l);
      history.replaceState(null, '', url.toString());
    });
  });
})();
