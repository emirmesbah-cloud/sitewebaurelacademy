# ============================================================================
# Aurel Academy — Auto-deploy public_html → cPanel Octenium via lftp
#
# Pourquoi lftp et pas une GitHub Action FTP tierce :
#   - SamKirkland/FTP-Deploy-Action plantait sur ECONNRESET avec Octenium
#   - lftp est rock-solid, géré directement par Octenium/cPanel depuis 20 ans
#   - lftp gère les retries auto sur erreur réseau
#   - Mirror différentiel : n'upload que les fichiers modifiés
#
# SECRETS REQUIS :
#   FTP_SERVER     ex: aurel-academy.com
#   FTP_USERNAME   ex: github@aurel-academy.com
#   FTP_PASSWORD   ex: ******
#   FTP_SERVER_DIR ex: ./   (racine du compte FTP, déjà chrooté à public_html)
# ============================================================================

name: Deploy to cPanel via FTP

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: lftp mirror to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=0
          for var in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_SERVER_DIR; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing secret $var"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then exit 1; fi
          echo "✅ Secrets OK"
        env:
          FTP_SERVER:     ${{ secrets.FTP_SERVER }}
          FTP_USERNAME:   ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}

      - name: Install lftp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lftp
          lftp --version | head -1

      - name: Sync files via lftp mirror
        env:
          FTP_SERVER:     ${{ secrets.FTP_SERVER }}
          FTP_USERNAME:   ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -e

          # Crée un fichier de commandes lftp pour éviter d'exposer le password
          # dans la ligne de commande (visible dans `ps`).
          cat > lftp_commands.txt <<'EOF'
          set ftp:passive-mode true
          set ssl:verify-certificate no
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 1.5
          set net:timeout 30
          set ftp:list-options -a
          set xfer:clobber on
          set mirror:parallel-transfer-count 3
          EOF

          # Le password est passé via variable env, pas en clair dans le script.
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p 21 "ftp://$FTP_SERVER" <<EOF
          $(cat lftp_commands.txt)

          # Mirror local → remote.
          # Options :
          #   -R / --reverse          : sens local → remote (upload)
          #   --verbose=2             : log moyennement détaillé
          #   --ignore-time           : compare via taille (timestamps FTP non fiables)
          #   --no-perms              : ne tente pas de modifier les permissions distantes
          #   --parallel=3            : 3 transferts simultanés
          #
          # NOTE : pas de --delete pour préserver les fichiers serveur qu'on
          # ne veut pas écraser (par ex. WordPress, fichiers cPanel internes).
          # Exclude .git, .github, .env, README, node_modules, etc.
          mirror --reverse \
                 --verbose=2 \
                 --ignore-time \
                 --no-perms \
                 --parallel=3 \
                 --exclude-glob .git \
                 --exclude-glob .git/ \
                 --exclude-glob .github \
                 --exclude-glob .github/ \
                 --exclude-glob .env \
                 --exclude-glob .env.* \
                 --exclude-glob README.md \
                 --exclude-glob *.md \
                 --exclude-glob node_modules \
                 --exclude-glob node_modules/ \
                 --exclude-glob .DS_Store \
                 --exclude-glob Thumbs.db \
                 --exclude-glob lftp_commands.txt \
                 ./ "$FTP_SERVER_DIR"

          bye
          EOF

          echo "✅ Mirror terminé"

      - name: Summary
        if: always()
        run: |
          echo "## Deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status** : ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit** : \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Author** : ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Server** : \`${{ secrets.FTP_SERVER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Path**   : \`${{ secrets.FTP_SERVER_DIR }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Site mis à jour : https://aurel-academy.com/" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Échec — voir les logs ci-dessus." >> $GITHUB_STEP_SUMMARY
          fi
