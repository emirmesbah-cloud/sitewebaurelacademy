<script>
(function(){
  // Fallback group URL (in case sessionStorage is empty — same as in webinar.js)
  var GROUP_FALLBACK = 'https://chat.whatsapp.com/PLACEHOLDER';
  var url;
  try { url = sessionStorage.getItem('aurel.wb.groupUrl'); } catch(e){}
  if (!url) url = GROUP_FALLBACK;

  setTimeout(function(){
    window.location.href = url;
  }, 1000);
})();
</script>
